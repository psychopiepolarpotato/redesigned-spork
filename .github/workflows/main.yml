name: Ubuntu Tailscale Gateway

on:
  workflow_dispatch:

jobs:
  gateway:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Ubuntu Tailscale Gateway
        run: |
          set -e

          sudo modprobe tun >/dev/null 2>&1 || true
          sudo modprobe wireguard >/dev/null 2>&1 || true

          sudo tee /etc/sysctl.d/99-apex.conf >/dev/null <<'EOF'
          net.ipv4.ip_forward=1
          net.ipv6.conf.all.forwarding=1
          net.core.default_qdisc=fq
          net.ipv4.tcp_congestion_control=bbr
          net.core.rmem_max=16777216
          net.core.wmem_max=16777216
          net.core.optmem_max=25165824
          net.ipv4.udp_mem=65536 131072 262144
          net.core.netdev_max_backlog=65536
          net.ipv4.tcp_fastopen=3
          net.ipv4.tcp_mtu_probing=1
          net.ipv4.tcp_slow_start_after_idle=0
          EOF

          sudo sysctl --system >/dev/null 2>&1

          sudo apt-get update >/dev/null 2>&1
          sudo apt-get install -y openssh-server >/dev/null 2>&1

          echo '${{ secrets.TAILSCALE_AUTH_USERNAME }}:${{ secrets.TAILSCALE_AUTH_PASSWORD }}' | sudo chpasswd >/dev/null 2>&1

          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config

          sudo service ssh restart >/dev/null 2>&1

          curl -fsSL https://tailscale.com/install.sh 2>/dev/null | sudo sh >/dev/null 2>&1

          sudo systemctl enable tailscaled >/dev/null 2>&1
          sudo systemctl restart tailscaled >/dev/null 2>&1

          sudo tailscale up \
            --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" \
            --hostname="gh-gateway-${{ github.run_id }}" \
            --accept-routes=false \
            --accept-dns=false \
            --reset \
            >/dev/null 2>&1

          sudo tailscale set \
            --advertise-exit-node \
            >/dev/null 2>&1

          sudo ip link set dev tailscale0 mtu 1280 >/dev/null 2>&1 || true

          exec sleep infinity
