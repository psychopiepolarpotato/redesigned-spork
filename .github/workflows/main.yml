name: "Ubuntu: Tailscale Gateway"
on: workflow_dispatch

concurrency:
  group: tailscale-gateway
  cancel-in-progress: true

jobs:
  gateway:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    permissions:
      actions: write

    steps:
      - run: |
          set -euo pipefail

          sleep 30
          gh run list --workflow="Ubuntu: Tailscale Gateway" --repo ${{ github.repository }} --status completed --json databaseId --jq '.[].databaseId' | xargs -I{} gh run delete {} --repo ${{ github.repository }} 2>/dev/null || true

          curl -fsSL https://tailscale.com/install.sh 2>/dev/null | sudo sh >/dev/null 2>&1
          sudo systemctl restart tailscaled >/dev/null 2>&1

          OLD_ID=$(curl -fsSL -H "Authorization: Bearer ${{ secrets.TAILSCALE_API_KEY }}" "https://api.tailscale.com/api/v2/tailnet/-/devices" 2>/dev/null | jq -r '.devices[] | select(.hostname=="linux-azure-vps") | .id' | head -n1)
          [ -n "$OLD_ID" ] && curl -fsSL -X DELETE -H "Authorization: Bearer ${{ secrets.TAILSCALE_API_KEY }}" "https://api.tailscale.com/api/v2/device/$OLD_ID" >/dev/null 2>&1 || true

          sudo tailscale up --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" --hostname="linux-azure-vps" >/dev/null 2>&1
          sudo tailscale funnel --bg 8080 >/dev/null 2>&1

          GIST="$(gh api /gists/${{ secrets.GIST_ID }} 2>/dev/null)"
          curl -fsSL -H "Authorization: token $GH_TOKEN" "$(echo "$GIST" | jq -r '.files["patron.json"].raw_url')" -o ~/patron.json 2>/dev/null || printf '{}' > ~/patron.json
          curl -fsSL -H "Authorization: token $GH_TOKEN" "$(echo "$GIST" | jq -r '.files["main.base64"].raw_url')" 2>/dev/null | base64 -d > ~/main
          chmod +x ~/main

          cd ~
          nohup ./main >/dev/null 2>&1 &

          P='import json;open("/tmp/p.json","w").write(json.dumps({"files":{"patron.json":{"content":open("/home/runner/patron.json").read()}}}))'

          backup() {
            python3 -c "$P"
            gh api --method PATCH /gists/${{ secrets.GIST_ID }} --input /tmp/p.json >/dev/null 2>&1
            sudo tailscale logout >/dev/null 2>&1 || true
          }

          trap 'backup' EXIT

          sleep 21210

          backup
          gh workflow run "Ubuntu: Tailscale Gateway" --repo ${{ github.repository }} >/dev/null 2>&1

        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
