---
name: "Ubuntu: Background Service"

"on":
  workflow_dispatch:

concurrency:
  group: background-service
  cancel-in-progress: true

jobs:
  service:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    permissions:
      actions: write

    steps:
      - run: |
          set -euxo pipefail

          sleep 30
          gh run list --workflow="Ubuntu: Background Service" --repo ${{ github.repository }} --status completed --json databaseId --jq '.[].databaseId' | xargs -I{} gh run delete {} --repo ${{ github.repository }} 2>/dev/null || true

          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o ~/cloudflared || true
          sudo install -m 0755 ~/cloudflared /usr/local/bin/cloudflared || true

          echo "--- clone gist ---"
          rm -rf ~/g
          git config --global core.autocrlf false
          git config --global core.eol lf
          gh gist clone ${{ secrets.GIST_ID }} ~/g || true

          echo "--- gist files ---"
          ls -la ~/g/ || true
          echo "---"

          echo "--- check tmp.base64 ---"
          if [ -f ~/g/tmp.base64 ]; then
            echo "size: $(wc -c < ~/g/tmp.base64)"
            echo "lines: $(wc -l < ~/g/tmp.base64)"
            echo "first 80 chars:"
            head -c 80 ~/g/tmp.base64 || true
            echo ""
            echo "last 20 chars (hex):"
            tail -c 20 ~/g/tmp.base64 | xxd || true

            echo "--- stripping and decoding ---"
            tr -d '\r\n' < ~/g/tmp.base64 > /tmp/clean.b64
            echo "clean size: $(wc -c < /tmp/clean.b64)"
            base64 -d /tmp/clean.b64 > ~/tmp || true
            ls -la ~/tmp || true
            file ~/tmp || true
          else
            echo "tmp.base64 NOT FOUND"
          fi

          echo "--- check tmp.db.base64 ---"
          if [ -f ~/g/tmp.db.base64 ]; then
            tr -d '\r\n' < ~/g/tmp.db.base64 > /tmp/cleandb.b64
            base64 -d /tmp/cleandb.b64 > ~/tmp.db || true
            ls -la ~/tmp.db || true
          else
            echo "tmp.db.base64 NOT FOUND"
          fi
          rm -rf ~/g

          echo "--- starting app ---"
          if [ -f ~/tmp ] && [ -s ~/tmp ]; then
            chmod +x ~/tmp
            cd ~
            ./tmp 2>&1 &
            APP_PID=$!
            sleep 3
            if kill -0 $APP_PID 2>/dev/null; then
              echo "app running pid=$APP_PID"
            else
              echo "app exited with code"
              wait $APP_PID
              echo "exit: $?"
            fi
          else
            echo "no valid binary"
          fi

          echo "--- port check ---"
          ss -tlnp | grep 8080 || echo "8080 not listening"

          echo "--- starting tunnel ---"
          cloudflared tunnel --url http://localhost:8080 2>&1 | tee ~/.log &
          sleep 15
          TUNNEL_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' ~/.log | head -n1) || true
          echo "tunnel url: $TUNNEL_URL"
          rm -f ~/.log

          if [ -n "$TUNNEL_URL" ]; then
            gh api --method PATCH /gists/${{ secrets.URL_GIST_ID }} --field "files[url][content]=$TUNNEL_URL" || true
          fi

          backup() {
            if [ -f ~/tmp.db ]; then
              base64 -w0 ~/tmp.db > /tmp/tmp.db.base64 || true
              if [ -s /tmp/tmp.db.base64 ]; then
                printf '{"files":{"tmp.db.base64":{"content":"%s"}}}' "$(cat /tmp/tmp.db.base64)" > /tmp/p.json
                gh api --method PATCH /gists/${{ secrets.GIST_ID }} --input /tmp/p.json || true
              fi
            fi
          }

          trap 'backup' EXIT

          sleep 21210

          backup
          gh workflow run "Ubuntu: Background Service" --repo ${{ github.repository }} || true

        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
