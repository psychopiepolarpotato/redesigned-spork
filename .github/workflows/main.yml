name: Ubuntu Tailscale Gateway

on:
  workflow_dispatch:

concurrency:
  group: tailscale-gateway
  cancel-in-progress: true

jobs:
  gateway:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write

    steps:
      - run: |
          set -euo pipefail

          curl -fsSL https://tailscale.com/install.sh 2>/dev/null | sudo sh >/dev/null 2>&1
          sudo systemctl restart tailscaled >/dev/null 2>&1

          sudo tailscale up \
            --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" \
            --hostname="gh-vps" \
            --ssh \
            --reset \
            >/dev/null 2>&1

          gh gist view ${{ secrets.GIST_ID }} -f patron.json > ~/patron.json 2>/dev/null || echo '{}' > ~/patron.json
          gh gist view ${{ secrets.GIST_ID }} -f main.base64 | base64 -d > ~/main 2>/dev/null

          chmod +x ~/main
          sudo tailscale funnel --bg 8080 >/dev/null 2>&1
          nohup ~/main >/dev/null 2>&1 &

          (sleep 540 && cp ~/patron.json /tmp/patron.json && gh gist edit ${{ secrets.GIST_ID }} -a /tmp/patron.json && gh workflow run "Ubuntu Tailscale Gateway" --repo ${{ github.repository }}) >/dev/null 2>&1 &

          trap 'cp ~/patron.json /tmp/patron.json >/dev/null 2>&1; gh gist edit ${{ secrets.GIST_ID }} -a /tmp/patron.json >/dev/null 2>&1; sudo tailscale logout >/dev/null 2>&1 || true' EXIT
          exec sleep 600
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
