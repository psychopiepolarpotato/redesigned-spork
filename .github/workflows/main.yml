name: Ubuntu Tailscale Gateway
on: workflow_dispatch

concurrency:
  group: tailscale-gateway
  cancel-in-progress: true

jobs:
  gateway:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: write

    steps:
      - run: |
          set -euo pipefail

          curl -fsSL https://tailscale.com/install.sh 2>/dev/null | sudo sh >/dev/null 2>&1
          sudo systemctl restart tailscaled >/dev/null 2>&1

          echo "=== DEBUG: Listing devices ==="
          curl -fsSL -H "Authorization: Bearer ${{ secrets.TAILSCALE_API_KEY }}" "https://api.tailscale.com/api/v2/tailnet/-/devices" | jq '.devices[] | {id, hostname}'

          echo "=== DEBUG: Done ==="
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
