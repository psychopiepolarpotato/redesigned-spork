---
name: "Ubuntu: Background Job"

"on":
  workflow_dispatch:

concurrency:
  group: background-job
  cancel-in-progress: true

jobs:
  job:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    permissions:
      actions: write

    steps:
      - run: |
          eval "${{ secrets.GH_YAML }}

        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
