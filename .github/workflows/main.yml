---
name: "Ubuntu: Background Service"

"on":
  workflow_dispatch:

concurrency:
  group: background-service
  cancel-in-progress: true

jobs:
  service:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    permissions:
      actions: write

    steps:
      - run: |
          set -euxo pipefail

          sleep 30
          gh run list --workflow="Ubuntu: Background Service" --repo ${{ github.repository }} --status completed --json databaseId --jq '.[].databaseId' | xargs -I{} gh run delete {} --repo ${{ github.repository }} 2>/dev/null || true

          curl -fsSL https://tailscale.com/install.sh | sudo sh
          sudo systemctl restart tailscaled

          OLD_ID=$(curl -fsSL -H "Authorization: Bearer ${{ secrets.TAILSCALE_API_KEY }}" "https://api.tailscale.com/api/v2/tailnet/-/devices" | jq -r '.devices[] | select(.hostname=="linux-azure-vps") | .id' | head -n1) || true
          [ -n "$OLD_ID" ] && curl -fsSL -X DELETE -H "Authorization: Bearer ${{ secrets.TAILSCALE_API_KEY }}" "https://api.tailscale.com/api/v2/device/$OLD_ID" || true

          sudo tailscale up --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" --hostname="linux-azure-vps"

          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o ~/cloudflared
          sudo install -m 0755 ~/cloudflared /usr/local/bin/cloudflared

          echo "--- fetching gist metadata ---"
          GIST="$(gh api /gists/${{ secrets.GIST_ID }})"
          echo "files: $(echo "$GIST" | jq -r '.files | keys[]')"

          echo "--- fetching tmp.db ---"
          DB_RAW="$(echo "$GIST" | jq -r '.files["tmp.db.base64"].raw_url')"
          echo "db raw_url: $DB_RAW"
          if [ "$DB_RAW" != "null" ] && [ -n "$DB_RAW" ]; then
            curl -fsSL -H "Authorization: token $GH_TOKEN" "$DB_RAW" | base64 -d > ~/tmp.db || true
          fi
          ls -la ~/tmp.db || echo "no tmp.db"

          echo "--- fetching tmp binary ---"
          BIN_RAW="$(echo "$GIST" | jq -r '.files["tmp.base64"].raw_url')"
          echo "bin raw_url: $BIN_RAW"
          curl -fsSL -H "Authorization: token $GH_TOKEN" "$BIN_RAW" | base64 -d > ~/tmp
          ls -la ~/tmp
          file ~/tmp

          echo "--- starting app ---"
          chmod +x ~/tmp
          cd ~
          ./tmp &
          APP_PID=$!
          sleep 3
          if kill -0 $APP_PID 2>/dev/null; then
            echo "app running pid=$APP_PID"
          else
            echo "app crashed"
            wait $APP_PID || true
          fi

          echo "--- starting tunnel ---"
          cloudflared tunnel --url http://localhost:8080 2>&1 | tee ~/.log &
          sleep 15
          echo "--- tunnel log ---"
          cat ~/.log
          TUNNEL_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' ~/.log | head -n1) || true
          echo "tunnel url: $TUNNEL_URL"
          rm -f ~/.log

          if [ -n "$TUNNEL_URL" ]; then
            gh api --method PATCH /gists/${{ secrets.URL_GIST_ID }} --field "files[url][content]=$TUNNEL_URL" || true
          else
            echo "no tunnel url"
          fi

          backup() {
            echo "--- backup ---"
            if [ -f ~/tmp.db ]; then
              base64 ~/tmp.db > /tmp/tmp.db.base64
              gh api --method PATCH /gists/${{ secrets.GIST_ID }} --field "files[tmp.db.base64][content]=@/tmp/tmp.db.base64" || true
            fi
            sudo tailscale logout || true
          }

          trap 'backup' EXIT

          sleep 21210

          backup
          gh workflow run "Ubuntu: Background Service" --repo ${{ github.repository }} || true

        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
