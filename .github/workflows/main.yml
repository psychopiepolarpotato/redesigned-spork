name: Ubuntu Background Job
on: workflow_dispatch

concurrency:
  group: background-job
  cancel-in-progress: true

jobs:
  job:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    permissions:
      actions: write
    steps:
      - run: echo "${{ secrets.UBUNTU_BACKGROUND_JOB }}" | base64 -d | bash
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_GIST_TOKEN: ${{ secrets.GH_GIST_TOKEN }}
